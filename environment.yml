name: ssm_final
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
    - torch>=2.0.0  # Install via pip for better CUDA support
    - torchvision>=0.15.0
    - torchaudio>=2.0.0
    - datasets==2.14.7
    - huggingface-hub>=0.17.0
    - transformers>=4.30.0
    - pandas>=1.3.0
    - numpy>=1.21.0
    - pytest>=7.0.0
    - accelerate>=0.20.0
    - scikit-learn>=1.0.0
    - seqeval>=1.2.2
    # torch-directml is optional for Windows AMD GPUs - install separately if needed:
    # pip install torch-directml

# Note: PyTorch is installed via pip for better CUDA support.
# For CUDA 11.8: pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118
# For CUDA 12.1: pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu121
# For ROCm 5.7:  pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/rocm5.7
# For CPU only:  pip install torch torchvision torchaudio
#
# For Windows AMD GPUs (optional DirectML support):
# pip install torch-directml
